<!DOCTYPE html>
<html>
<head>
    <title>Traffic Violation AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141E30, #243B55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::file-selector-button {
            background: #00c6ff;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .btn-upload {
            margin-top: 20px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn-upload:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00c6ff;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="card-box">
    <h1>🚦 Traffic Violation AI</h1>
    <div class="subtitle">Upload a traffic video to detect violations using AI</div>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="video" class="form-control mb-3" required>
        <button type="submit" class="btn-upload">Upload & Detect</button>
    </form>

    <div class="footer">
        Powered by YOLOv8 & OCR
    </div>
</div>

</body>
</html>
